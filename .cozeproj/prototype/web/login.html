<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- 字体 -->
  <link href="https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google/google-all-fonts.css" rel="stylesheet"/>

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 === */
      --color-primary:              #111111;
      --color-primary_container:    #E8E4DC;
      --color-on-primary:           #FFFFFF;
      /* === 背景 / 表面 === */
      --color-background:                 #F4F1EA;
      --color-surface-container-lowest:   #EFEBE2;
      --color-surface:                    #FFFFFF;
      --color-surface-container:          #E8E4DC;
      --color-surface-container-high:     #D8D1C4;
      --color-surface-container-highest:  #CFC8BA;
      /* === 文字 === */
      --color-on-surface:           #111111;
      --color-on-surface-variant:   #6B665E;
      /* === 功能色 === */
      --color-success:  #22c55e;
      --color-error:    #ef4444;
      --color-warning:  #f59e0b;
      /* === 边框 === */
      --color-outline:          #D8D1C4;
      --color-outline-variant:  #D8D1C4;
      /* === 圆角 === */
      --radius-sm:   0.25rem;
      --radius-md:   0.375rem;
      --radius-lg:   0.5rem;
      --radius-xl:   0.75rem;
      --radius-2xl:  1rem;
      --radius-full: 9999px;
      /* === 阴影 === */
      --shadow-card:   0 2px 8px rgba(0,0,0,0.08);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.10);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.15);
      /* === 字体 === */
      --font-sans: "Noto Sans SC", "Noto Serif SC", system-ui, sans-serif;
      --font-serif: "Playfair Display", "Georgia", "Noto Serif SC", serif;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans min-h-screen">

  <main class="min-h-screen flex items-center justify-center px-6 py-12">
    <!-- @main-content:start -->
    <div class="w-full max-w-sm bg-surface rounded-xl shadow-card p-10">
      <!-- 页面标题 -->
      <div class="text-center mb-10">
        <h1 class="text-3xl font-serif font-bold text-on-surface mb-2">欢迎回来</h1>
        <p class="text-sm text-on-surface-variant">登录你的个人门户账号</p>
      </div>

      <!-- 登录表单 -->
      <form id="login-form" class="space-y-6">
        <!-- 邮箱输入 -->
        <div class="space-y-1.5">
          <label for="login-email" class="text-sm font-medium text-on-surface">邮箱</label>
          <input type="email" id="login-email" placeholder="your@email.com"
                 class="w-full bg-surface-container border-none rounded-md px-4 py-3 text-sm text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors"/>
        </div>

        <!-- 密码输入 -->
        <div class="space-y-1.5">
          <label for="login-password" class="text-sm font-medium text-on-surface">密码</label>
          <input type="password" id="login-password" placeholder="输入密码"
                 class="w-full bg-surface-container border-none rounded-md px-4 py-3 text-sm text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors"/>
        </div>

        <!-- 忘记密码 -->
        <div class="flex justify-end">
          <a href="#" id="link-forgot-password" class="text-sm text-on-surface-variant hover:text-on-surface transition-colors">忘记密码？</a>
        </div>

        <!-- 登录按钮 -->
        <button type="submit" id="btn-login"
                class="w-full bg-primary text-on-primary px-4 py-3 rounded-md text-sm font-medium hover:opacity-90 active:scale-[0.98] transition-all">
          登录
        </button>
      </form>

      <!-- 底部注册链接 -->
      <div class="mt-8 text-center">
        <p class="text-sm text-on-surface-variant">
          还没有账号？
          <a href="register.html" id="link-register" class="text-on-surface font-medium hover:underline ml-1">立即注册</a>
        </p>
      </div>
    </div>
    <!-- @main-content:end -->
  </main>

  <script>
    $(function() {
      // 登录表单提交 - demo 项目不判断账密，直接跳转首页
      $('#login-form').on('submit', function(e) {
        e.preventDefault();
        window.location.href = 'home.html';
      });

      // 忘记密码链接 - 点击后应实现密码重置流程：
      // 1. 弹出模态框或跳转至密码重置页，要求输入注册邮箱
      // 2. 后端发送包含重置链接的邮件到用户邮箱
      // 3. 用户点击邮件链接进入新页面，输入新密码并确认
      // 4. 重置成功后提示用户，跳转回登录页
      $('#link-forgot-password').on('click', function(e) {
        e.preventDefault();
        console.log('需要实现密码重置功能：弹出邮箱输入框，发送重置邮件');
      });
    });
  </script>

  <script>lucide.createIcons();</script>
</body>

</html>
