  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>

  <script>
    $(function() {
      // ========== 初始化图标 ==========
      lucide.createIcons();

      // ========== 判断新建/编辑模式 ==========
      // 编辑模式下页面标题应改为"编辑笔记"，并回显已有数据
      // 1. 解析 URL 参数，获取 note_id
      // 2. 若存在 note_id，将标题改为"编辑笔记"
      // 3. 将硬编码的 mock 数据填充到表单各字段中
      const urlParams = new URLSearchParams(window.location.search);
      const noteId = urlParams.get('id');
      if (noteId) {
        $('#page-title').text('编辑笔记');
        // 编辑模式下回显 mock 数据（实际应从后端获取）
        $('#note-title').val('深入理解 React Hooks 的设计哲学');
        $('#note-category').val('tech');
        $('#note-content').val('# 深入理解 React Hooks 的设计哲学\n\nReact Hooks 是 React 16.8 引入的特性，它让函数组件拥有了状态和其他 React 特性。\n\n## 为什么需要 Hooks\n\n在 Hooks 出现之前，我们主要使用类组件来管理状态。但类组件存在一些问题：\n\n- **逻辑复用困难**：高阶组件和 render props 会导致组件嵌套地狱\n- **this 指向问题**：需要绑定事件处理函数\n- **生命周期方法拆分逻辑**：相关逻辑分散在不同生命周期中\n\n## useState 的工作原理\n\n```javascript\nconst [count, setCount] = useState(0);\n```\n\nuseState 返回一个状态值和更新函数。React 通过闭包和链表来跟踪每个组件的状态。\n\n> Hooks 的设计灵感来源于代数效应（Algebraic Effects），这是一种函数式编程的概念。\n\n## 最佳实践\n\n1. 只在最顶层调用 Hooks\n2. 只在 React 函数中调用 Hooks\n3. 使用 ESLint 插件进行规则检查\n\n继续探索 Hooks 的奥秘…');
      }

      // ========== 公开/私密开关切换 ==========
      $('#toggle-public').on('click', function() {
        const isChecked = $(this).attr('aria-checked') === 'true';
        const newState = !isChecked;
        $(this).attr('aria-checked', newState);
        if (newState) {
          $(this).removeClass('bg-surface-container-high').addClass('bg-primary');
          $('#toggle-knob').removeClass('translate-x-1').addClass('translate-x-6');
          $('#visibility-label').text('公开笔记');
          $('#visibility-desc').text('所有人都能看到这篇笔记');
          $('#visibility-icon-public').removeClass('hidden').addClass('flex');
          $('#visibility-icon-private').removeClass('flex').addClass('hidden');
        } else {
          $(this).removeClass('bg-primary').addClass('bg-surface-container-high');
          $('#toggle-knob').removeClass('translate-x-6').addClass('translate-x-1');
          $('#visibility-label').text('私密笔记');
          $('#visibility-desc').text('仅自己可见');
          $('#visibility-icon-public').removeClass('flex').addClass('hidden');
          $('#visibility-icon-private').removeClass('hidden').addClass('flex');
        }
      });

      // ========== 标签输入 ==========
      // 标签输入为复杂交互，此处仅绑定事件入口
      // 完整实现应包含：
      // 1. 在输入框中输入文字并按 Enter/逗号/空格时，将文字转为标签 pill 添加到容器中
      // 2. 每个标签 pill 显示标签名和删除按钮
      // 3. 点击删除按钮或按 Backspace 在空输入时删除最后一个标签
      // 4. 重复标签自动去重并给出提示
      // 5. 标签数量限制（如最多 10 个）
      $('#note-tags-input').on('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ',') {
          e.preventDefault();
          const val = $(this).val().trim();
          if (val) {
            console.log('添加标签:', val);
            // 实际应创建标签 DOM 并插入到输入框前
          }
          $(this).val('');
        }
        if (e.key === 'Backspace' && $(this).val() === '') {
          // 删除最后一个标签
          const lastTag = $('#tags-container .tag-item').last();
          if (lastTag.length) {
            console.log('删除标签:', lastTag.find('.tag-remove').data('tag'));
            lastTag.remove();
          }
        }
      });

      // 删除已有标签
      $('#tags-container').on('click', '.tag-remove', function() {
        const tagName = $(this).data('tag');
        console.log('删除标签:', tagName);
        $(this).closest('.tag-item').remove();
      });

      // ========== Markdown 工具栏 ==========
      // Markdown 编辑器工具栏为复杂交互，此处仅绑定事件入口
      // 完整实现应包含：
      // 1. 获取 textarea 当前光标位置
      // 2. 根据点击的按钮类型，在光标处插入对应的 Markdown 语法标记
      //    - 粗体: 在选中文本两侧插入 ** 或将光标包裹在 **** 中间
      //    - 斜体: 在选中文本两侧插入 * 或将光标包裹在 ** 中间
      //    - 标题: 在当前行开头插入 ## 
      //    - 列表: 在当前行开头插入 - 
      //    - 链接: 插入 [链接文本](url) 并选中链接文本
      //    - 代码块: 插入 ```\n\n``` 并将光标置于中间
      //    - 引用: 在当前行开头插入 > 
      // 3. 插入后保持 textarea focus 并恢复光标位置
      $('#toolbar-bold, #toolbar-italic, #toolbar-heading, #toolbar-list, #toolbar-link, #toolbar-code, #toolbar-quote').on('click', function() {
        const toolbarId = $(this).attr('id');
        console.log('点击工具栏按钮:', toolbarId);
        // 实际应实现 Markdown 语法插入逻辑
      });

      // ========== 保存按钮 ==========
      $('#btn-save').on('click', function() {
        const title = $('#note-title').val().trim();
        if (!title) {
          alert('请输入笔记标题');
          $('#note-title').focus();
          return;
        }
        const data = {
          title: title,
          category: $('#note-category').val(),
          tags: $('#tags-container .tag-item').map(function() { return $(this).text().trim(); }).get(),
          is_public: $('#toggle-public').attr('aria-checked') === 'true',
          content: $('#note-content').val()
        };
        console.log('保存笔记数据:', data);
        // 实际应调用后端 API 保存笔记
        // 新建模式：POST /api/notes，成功后跳转到笔记详情页 note-detail.html?id=xxx
        // 编辑模式：PUT /api/notes/:id，成功后跳转到笔记详情页 note-detail.html?id=xxx
        const redirectId = noteId || 'mock-note-id';
        window.location.href = 'note-detail.html?id=' + redirectId;
      });

      // ========== 取消按钮 ==========
      // 点击取消时，若表单有未保存的更改，弹出确认弹窗；否则直接返回列表页
      let hasUnsavedChanges = true; // 实际应通过监听表单变化来动态设置
      $('#btn-cancel').on('click', function(e) {
        if (hasUnsavedChanges) {
          e.preventDefault();
          $('#modal-discard').removeClass('hidden');
        }
      });

      // 弹窗 - 继续编辑
      $('#modal-discard-cancel').on('click', function() {
        $('#modal-discard').addClass('hidden');
      });

      // 弹窗 - 放弃更改
      $('#modal-discard-confirm').on('click', function() {
        window.location.href = 'notes.html';
      });

      // 点击弹窗遮罩关闭
      $('#modal-discard').on('click', function(e) {
        if (e.target === this) {
          $('#modal-discard').addClass('hidden');
        }
      });

      // ========== 监听表单变化标记未保存状态 ==========
      $('#note-title, #note-category, #note-content').on('input change', function() {
        hasUnsavedChanges = true;
      });
    });
  </script>

  <script>lucide.createIcons();</script>
</body>

</html>
