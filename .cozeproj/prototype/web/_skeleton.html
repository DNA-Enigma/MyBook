  <style type="text/tailwindcss">
    @theme {
      --color-primary:              #111111;
      --color-primary-container:    #EAE6DD;
      --color-on-primary:           #F4F1EA;
      --color-background:           #F4F1EA;
      --color-surface-container-lowest: #FAF9F6;
      --color-surface:              #F4F1EA;
      --color-surface-container:    #EAE6DD;
      --color-surface-container-high: #E2DDD3;
      --color-surface-container-highest: #D8D1C4;
      --color-on-surface:           #111111;
      --color-on-surface-variant:   #6B665E;
      --color-success:  #2D5A3D;
      --color-error:    #8B3A3A;
      --color-warning:  #7A5C2E;
      --color-outline:          #D8D1C4;
      --color-outline-variant:  #EAE6DD;
      --radius-sm:   0rem;
      --radius-md:   0rem;
      --radius-lg:   0rem;
      --radius-xl:   0rem;
      --radius-2xl:  0rem;
      --radius-full: 9999px;
      --shadow-card:   0 1px 2px rgba(0,0,0,0.04);

      --shadow-dialog: 0 8px 16px rgba(0,0,0,0.06);

    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23EAE6DD"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%236B665E" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>
