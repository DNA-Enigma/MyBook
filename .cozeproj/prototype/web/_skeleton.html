<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet"/>

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 === */
      --color-primary:              #111111;
      --color-primary-container:    #EAE6DD;
      --color-on-primary:           #F4F1EA;
      /* === 背景 / 表面 === */
      --color-background:                 #F4F1EA;
      --color-surface-container-lowest:   #FFFFFF;
      --color-surface:                    #FFFFFF;
      --color-surface-container:          #EAE6DD;
      --color-surface-container-high:     #DEDAD0;
      --color-surface-container-highest:  #D8D1C4;
      /* === 文字 === */
      --color-on-surface:           #111111;
      --color-on-surface-variant:   #6B665E;
      /* === 功能色 === */
      --color-success:  #5A8A5E;
      --color-error:    #A63D3D;
      --color-warning:  #8A6D3B;
      /* === 边框 === */
      --color-outline:          #D8D1C4;
      --color-outline-variant:  #E5E0D6;
      /* === 圆角 === */
      --radius-sm:   0.0625rem;
      --radius-md:   0.0625rem;
      --radius-lg:   0.0625rem;
      --radius-xl:   0.0625rem;
      --radius-2xl:  0.0625rem;
      --radius-full: 9999px;
      /* === 阴影（杂志风禁止使用阴影，保留极淡的层级区分） === */
      --shadow-card:   0 1px 2px rgba(0,0,0,0.03);
      --shadow-float:  0 2px 4px rgba(0,0,0,0.04);
      --shadow-dialog: 0 4px 12px rgba(0,0,0,0.06);
      /* === 字体 === */
      --font-serif: "Playfair Display", "Noto Serif SC", Georgia, serif;
      --font-sans: "Noto Serif SC", Georgia, "Times New Roman", serif;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23EAE6DD"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%236B665E" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans">

  <!-- @nav:start 导航组件 -->
  <header class="border-b border-outline-variant/20 bg-background">

      <nav class="hidden md:flex items-center gap-8">
        <a href="home.html" class="text-sm tracking-wide text-on-surface-variant hover:text-on-surface transition-colors pb-0.5">首页</a>
        <a href="blog.html" class="text-sm tracking-wide text-on-surface-variant hover:text-on-surface transition-colors pb-0.5">博客</a>
        <a href="works.html" class="text-sm tracking-wide text-on-surface-variant hover:text-on-surface transition-colors pb-0.5">作品</a>
        <a href="resources.html" class="text-sm tracking-wide text-on-surface-variant hover:text-on-surface transition-colors pb-0.5">资源库</a>
        <a href="about.html" class="text-sm tracking-wide text-on-surface-variant hover:text-on-surface transition-colors pb-0.5">关于</a>
      </nav>
      <div class="flex items-center gap-4">
        <a href="profile.html" class="text-sm tracking-wide text-on-surface-variant hover:text-on-surface transition-colors">个人主页</a>
        <button class="text-sm tracking-wide text-on-surface-variant hover:text-on-surface transition-colors">退出</button>
      </div>
    </div>
  </header>
  <!-- @nav:end 导航组件 -->

  <main class="max-w-6xl mx-auto px-6 py-12">
    <!-- @main-content:start -->
    <!-- @main-content:end -->
  </main>

  <script>lucide.createIcons();</script>
</body>

</html>
