<!DOCTYPE html>

<head>

  <link href="https://lf-code-agent.coze.cn/obj/x-ai-cn/fonts/google/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet"/>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 === */
      --color-primary:              #111111;
      --color-primary-container:    #EAE6DD;
      --color-on-primary:           #F4F1EA;
      /* === 背景 / 表面 === */
      --color-background:                 #F4F1EA;
      --color-surface-container-lowest:   #FFFFFF;
      --color-surface:                    #FFFFFF;
      --color-surface-container:          #EAE6DD;
      --color-surface-container-high:     #DEDAD0;
      --color-surface-container-highest:  #D8D1C4;
      /* === 文字 === */
      --color-on-surface:           #111111;
      --color-on-surface-variant:   #6B665E;
      /* === 功能色 === */
      --color-success:  #5A8A5E;
      --color-error:    #A63D3D;
      --color-warning:  #8A6D3B;
      /* === 边框 === */
      --color-outline:          #D8D1C4;
      --color-outline-variant:  #E5E0D6;
      /* === 圆角 === */
      --radius-sm:   0.0625rem;
      --radius-md:   0.0625rem;
      --radius-lg:   0.0625rem;
      --radius-xl:   0.0625rem;
      --radius-2xl:  0.0625rem;
      --radius-full: 9999px;
      /* === 阴影（杂志风禁止使用阴影，保留极淡的层级区分） === */
      --shadow-card:   0 1px 2px rgba(0,0,0,0.03);
      --shadow-float:  0 2px 4px rgba(0,0,0,0.04);
      --shadow-dialog: 0 4px 12px rgba(0,0,0,0.06);
      /* === 字体 === */
      --font-serif: "Playfair Display", "Noto Serif SC", Georgia, serif;
      --font-sans: "Noto Serif SC", Georgia, "Times New Roman", serif;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23EAE6DD"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%236B665E" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans">

      <!-- 列表-资源5: BandZIP -->

            </div>
            <div class="flex items-center gap-4 mt-1">
              <span class="text-xs text-on-surface-variant tracking-wide">7.1 MB</span>
              <span class="text-xs text-on-surface-variant/60 tracking-wide">·</span>

    </div>

    <!-- 下载状态提示条（隐藏，下载时显示） -->
    <div id="download-toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-on-surface text-on-primary px-6 py-3 text-sm tracking-wide hidden z-50 flex items-center gap-3 shadow-float">
      <i data-lucide="loader" class="w-4 h-4 animate-spin" id="toast-icon-loading"></i>
      <i data-lucide="check-circle" class="w-4 h-4 text-success hidden" id="toast-icon-success"></i>
      <i data-lucide="alert-circle" class="w-4 h-4 text-error hidden" id="toast-icon-error"></i>
      <span id="toast-message">正在准备下载...</span>
    </div>

    <!-- 上传资源模态框 -->
    <div id="upload-modal" class="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50 hidden">
      <div class="bg-surface max-w-md w-full max-h-[90vh] overflow-y-auto p-8 shadow-dialog">
        <h2 class="font-serif text-xl font-semibold text-on-surface tracking-tight mb-6">上传资源</h2>
        <div class="space-y-5">
          <div>
            <label class="text-sm font-medium text-on-surface mb-1.5 block tracking-wide">资源名称</label>
            <input type="text" class="w-full bg-surface-container border-none px-3 py-2 text-sm text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors" placeholder="输入资源名称" id="input-resource-name" />
          </div>
          <div>
            <label class="text-sm font-medium text-on-surface mb-1.5 block tracking-wide">分类</label>
            <select class="w-full bg-surface-container border-none px-3 py-2 text-sm text-on-surface focus:outline-none focus:ring-2 focus:ring-primary/30 transition-colors" id="input-resource-category">
              <option value="software">软件</option>
              <option value="document">文档</option>
              <option value="docker">Docker镜像</option>
              <option value="other">其他</option>
            </select>
          </div>
          <div>
            <label class="text-sm font-medium text-on-surface mb-1.5 block tracking-wide">文件</label>
            <div class="border-2 border-dashed border-outline-variant/30 bg-surface-container/50 px-6 py-10 text-center cursor-pointer hover:border-primary/30 hover:bg-surface-container transition-colors" id="drop-zone">
              <i data-lucide="upload-cloud" class="w-8 h-8 text-on-surface-variant mx-auto mb-3"></i>
              <p class="text-sm text-on-surface-variant tracking-wide">点击或拖拽文件到此区域</p>
            </div>
          </div>
        </div>
        <div class="flex items-center justify-end gap-3 mt-8">

          <button id="btn-upload-confirm" class="bg-primary text-on-primary px-4 py-2 text-sm font-medium tracking-wide hover:opacity-90 active:scale-[0.98] transition-all">确认上传</button>
        </div>
      </div>
    </div>

    <!-- @main-content:end -->
  </main>

  <script>
    $(function () {

      // === 分类筛选 ===
      $('#filter-bar').on('click', '.filter-tag', function () {
        // 移除所有激活态
        $('.filter-tag').removeClass('text-on-surface font-semibold border-b-2 border-primary').addClass('text-on-surface-variant').removeAttr('aria-current');
        // 设置当前激活
        $(this).removeClass('text-on-surface-variant').addClass('text-on-surface font-semibold border-b-2 border-primary').attr('aria-current', 'true');

        var category = $(this).data('category');

        if (category === 'all') {
          $('.resource-item').show();
        } else {
          $('.resource-item').hide();
          $('.resource-item[data-category="' + category + '"]').show();
        }
      });

      // === 下载交互 ===
      $('#resource-list').on('click', '.btn-download', function () {
        var $btn = $(this);
        var $text = $btn.find('.btn-download-text');
        var resourceName = $btn.data('resource-name');

        // 防止重复点击
        if ($btn.hasClass('is-downloading')) return;
        $btn.addClass('is-downloading');

        // 显示下载中状态
        $text.text('准备中...');
        $btn.removeClass('bg-primary').addClass('bg-on-surface-variant');

        // 显示底部提示
        $('#toast-icon-loading').removeClass('hidden');
        $('#toast-icon-success').addClass('hidden');
        $('#toast-icon-error').addClass('hidden');
        $('#toast-message').text('正在准备下载「' + resourceName + '」...');
        $('#download-toast').removeClass('hidden');

        // 模拟下载准备：1.5秒后完成
        setTimeout(function () {
          $text.text('下载');
          $btn.removeClass('bg-on-surface-variant is-downloading').addClass('bg-primary');

          // 显示成功提示
          $('#toast-icon-loading').addClass('hidden');
          $('#toast-icon-success').removeClass('hidden');
          $('#toast-message').text('「' + resourceName + '」已开始下载');
          lucide.createIcons();

          // 2秒后隐藏提示
          setTimeout(function () {
            $('#download-toast').addClass('hidden');
          }, 2000);
        }, 1500);
      });

      // === 上传资源模态框 ===
      $('#btn-upload-resource').on('click', function () {
        $('#upload-modal').removeClass('hidden');
        lucide.createIcons();
      });

      $('#btn-upload-cancel').on('click', function () {
        $('#upload-modal').addClass('hidden');
        // 清空表单
        $('#input-resource-name').val('');
        $('#input-resource-category').val('software');
      });

      // 点击模态框遮罩关闭
      $('#upload-modal').on('click', function (e) {
        if ($(e.target).is('#upload-modal')) {
          $('#upload-modal').addClass('hidden');
        }
      });

      // 确认上传 - 复杂交互，仅绑定事件入口
      // 完整行为步骤：
      // 1. 验证资源名称不为空，文件已选择
      // 2. 显示上传进度条，模拟上传过程
      // 3. 上传完成后，在资源列表顶部插入新的资源项
      // 4. 关闭模态框，清空表单
      // 5. 显示上传成功提示
      $('#btn-upload-confirm').on('click', function () {
        console.log('上传资源 - 需实现：1. 验证名称与文件；2. 显示上传进度；3. 插入新资源项到列表；4. 关闭模态框并清空表单；5. 显示成功提示');
        $('#upload-modal').addClass('hidden');
      });

      // 拖拽区域点击 - 复杂交互，仅绑定事件入口
      // 完整行为步骤：
      // 1. 触发隐藏的 file input
      // 2. 用户选择文件后，在拖拽区域内显示文件名和大小
      // 3. 支持拖拽文件到该区域
      $('#drop-zone').on('click', function () {
        console.log('选择文件 - 需实现：1. 触发file input；2. 选择后显示文件名与大小；3. 支持拖拽上传');
      });

    });
  </script>

  <script>lucide.createIcons();</script>
</body>

</html>
